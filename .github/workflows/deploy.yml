name: Build, Lighthouse CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permisos mínimos necesarios — principio de mínimo privilegio
permissions:
  contents: read
  pull-requests: write  # para que Lighthouse CI comente en PRs

jobs:
  # ============================================================
  # JOB 1: Build + Lighthouse CI
  # Corre en cada PR y en push a main
  # ============================================================
  build-and-check:
    name: Build & Lighthouse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # SEGURIDAD: SHA fijo — los tags (@v4) son mutables y pueden ser
        # reemplazados. Un hash de commit es inmutable.
        # Actualizar SHA en: https://github.com/actions/checkout/releases
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        # SHA fijo — https://github.com/actions/setup-node/releases
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # SEGURIDAD: secrets usados en env:, nunca interpolados en run: directamente
        # (evita inyección de comandos si el valor contiene caracteres especiales)
        run: npm run build
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          PUBLIC_GA4_ID: ${{ secrets.PUBLIC_GA4_ID }}
          PUBLIC_CF_ANALYTICS_TOKEN: ${{ secrets.PUBLIC_CF_ANALYTICS_TOKEN }}
          FORMSPREE_FORM_ID: ${{ secrets.FORMSPREE_FORM_ID }}

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ============================================================
  # JOB 2: Deploy a Cloudflare Pages (solo en push a main)
  # Alternativa más simple: usar la integración nativa de CF Pages
  # con GitHub (sin este job — ver docs/DEPLOYMENT.md).
  # ============================================================
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-and-check
    # Condición segura: github.ref y github.event_name son valores
    # controlados por GitHub, no input de usuario.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          PUBLIC_GA4_ID: ${{ secrets.PUBLIC_GA4_ID }}
          PUBLIC_CF_ANALYTICS_TOKEN: ${{ secrets.PUBLIC_CF_ANALYTICS_TOKEN }}
          FORMSPREE_FORM_ID: ${{ secrets.FORMSPREE_FORM_ID }}

      - name: Deploy to Cloudflare Pages
        # SEGURIDAD: acción de tercero fijada a SHA.
        # Actualizar en: https://github.com/cloudflare/pages-action/releases
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PAGES_PROJECT_NAME }}
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
