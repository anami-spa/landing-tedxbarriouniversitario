name: Build, Lighthouse CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permisos mínimos necesarios — principio de mínimo privilegio
permissions:
  contents: read
  pull-requests: write  # para que Lighthouse CI comente en PRs

jobs:
  # ============================================================
  # JOB 1: Build + Lighthouse CI
  # Corre en cada PR y en push a main
  # ============================================================
  build-and-check:
    name: Build & Lighthouse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          PUBLIC_GA4_ID: ${{ secrets.PUBLIC_GA4_ID }}

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun
        continue-on-error: true  # no bloquea el deploy si Lighthouse falla

  # ============================================================
  # JOB 2: Deploy a DirectAdmin / PremiumHosting via FTPS
  # Solo en push a main (no en PRs)
  # ============================================================
  deploy:
    name: Deploy to PremiumHosting (DirectAdmin)
    runs-on: ubuntu-latest
    needs: build-and-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build para producción
        run: npm run build
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          PUBLIC_GA4_ID: ${{ secrets.PUBLIC_GA4_ID }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTPS a public_html/
        # SEGURIDAD: credenciales solo en env:, nunca en run: como literales.
        # lftp lee FTP_USER y FTP_PASSWORD de env — no aparecen en logs.
        env:
          FTP_SERVER: ${{ secrets.DA_FTP_SERVER }}
          FTP_USER: ${{ secrets.DA_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.DA_FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASSWORD" \
               -e "set ssl:verify-certificate no;
                   set ftp:ssl-allow yes;
                   mirror -R --delete --verbose dist/ public_html/;
                   quit" \
               "$FTP_SERVER"
