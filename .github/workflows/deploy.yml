name: Build, Lighthouse CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permisos mínimos necesarios — principio de mínimo privilegio
permissions:
  contents: read
  pull-requests: write  # para que Lighthouse CI comente en PRs

jobs:
  # ============================================================
  # JOB 1: Build + Lighthouse CI
  # Corre en cada PR y en push a main
  # ============================================================
  build-and-check:
    name: Build & Lighthouse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          PUBLIC_GA4_ID: ${{ secrets.PUBLIC_GA4_ID }}

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun
        continue-on-error: true  # no bloquea el deploy si Lighthouse falla

  # ============================================================
  # JOB 2: Deploy a DirectAdmin / PremiumHosting via rsync+SSH
  # Solo en push a main (no en PRs)
  # ============================================================
  deploy:
    name: Deploy to PremiumHosting (DirectAdmin)
    runs-on: ubuntu-latest
    needs: build-and-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build para producción
        run: npm run build
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          PUBLIC_GA4_ID: ${{ secrets.PUBLIC_GA4_ID }}

      - name: Install sshpass + rsync
        run: sudo apt-get install -y sshpass rsync

      - name: Configure SSH known_hosts
        # Fingerprint fijo del servidor — evita StrictHostKeyChecking=no (MITM)
        env:
          DA_SSH_KNOWN_HOSTS: ${{ secrets.DA_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$DA_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via rsync + SSH
        # SEGURIDAD: SSHPASS en env:, nunca en argv. sshpass lee SSHPASS de entorno.
        env:
          SSH_HOST: ${{ secrets.DA_FTP_SERVER }}
          SSH_USER: ${{ secrets.DA_FTP_USERNAME }}
          SSHPASS: ${{ secrets.DA_FTP_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -p 22" \
            dist/ "$SSH_USER@$SSH_HOST:public_html/"
