name: GitHub Pages Preview

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy-preview:
    name: Deploy GitHub Pages Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build para GitHub Pages (subdirectorio)
        run: npm run build
        env:
          SITE_URL: 'https://anami-spa.github.io/landing-tedxbarriouniversitario'
          BASE_PATH: '/landing-tedxbarriouniversitario'
          PUBLIC_GA4_ID: ''
          PUBLIC_CF_ANALYTICS_TOKEN: ''
          FORMSPREE_FORM_ID: 'placeholder'

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d231e62369c1b138c # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: ''
