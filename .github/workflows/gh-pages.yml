name: GitHub Pages Preview

on:
  push:
    branches: [main]
  workflow_dispatch: # permite disparar manualmente desde GitHub UI o gh CLI

permissions:
  contents: write

jobs:
  deploy-preview:
    name: Deploy GitHub Pages Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build para GitHub Pages (subdirectorio)
        run: npm run build
        env:
          SITE_URL: 'https://anami-spa.github.io/landing-tedxbarriouniversitario'
          BASE_PATH: '/landing-tedxbarriouniversitario'
          PUBLIC_GA4_ID: ''
          PUBLIC_CF_ANALYTICS_TOKEN: ''
          FORMSPREE_FORM_ID: 'placeholder'

      # Publicar dist/ en rama gh-pages usando git directamente
      # (sin dependencia de acciones de terceros)
      - name: Deploy to gh-pages via git
        run: |
          # Configuración global ANTES de git init en dist/
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cd dist
          git init
          git add -A
          git commit -m "Deploy preview: ${{ github.sha }}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages
